name: Build and Push Docker Image

on:
  # Real releases: pushing a tag like v1.2.3 will build + push
  push:
    tags:
      - "v*"

  # Tests: allow manual runs from the Actions UI
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR (ghcr.io)?"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in if we're actually going to push
      - name: Log in to Container Registry
        if: ${{ github.event_name == 'push' || inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For tag pushes (v1.2.3), produce semver tags + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            # For manual runs, also produce a unique test tag
            type=raw,value=test-${{ github.sha }}

      - name: Build (and optionally push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfiles/Dockerfile

          # Push on real tag releases; for manual runs, only if push_image=true
          push: ${{ github.event_name == 'push' || inputs.push_image }}

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
